<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Gestumio Admin</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2346C658'/%3E%3Cstop offset='1' stop-color='%230F8A3A'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='48' height='48' rx='12' fill='url(%23g)'/%3E%3Cpath d='M32 16.5 A10.5 10.5 0 1 0 33 30' fill='none' stroke='white' stroke-width='4.6' stroke-linecap='round'/%3E%3Cpath d='M33 30 H25.5' fill='none' stroke='%231E2A38' stroke-width='4.6' stroke-linecap='round'/%3E%3C/svg%3E"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
    .login-card h1{font-size:22px;font-weight:800;margin-bottom:6px}
    .login-card p{color:#64748b;font-size:14px;margin-bottom:24px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#374151}
    .field input{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;font-family:inherit}
    .field input:focus{border-color:#1BA84C;box-shadow:0 0 0 3px rgba(61,90,76,.1)}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
    .btn-primary{background:#1BA84C;color:#fff;width:100%}
    .btn-primary:hover{background:#2e4438}
    .btn-sm{padding:4px 11px;font-size:12px;border-radius:6px;cursor:pointer;border:none;font-family:inherit;font-weight:600;transition:all .15s}
    .btn-approve{background:#d1fae5;color:#065f46}.btn-approve:hover{background:#a7f3d0}
    .btn-reject{background:#fee2e2;color:#991b1b}.btn-reject:hover{background:#fecaca}
    .btn-delete{background:#f3f4f6;color:#374151;border:1px solid #d1d5db}.btn-delete:hover{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
    .btn-bonif-on{background:#ede9fe;color:#6d28d9}.btn-bonif-on:hover{background:#ddd6fe}
    .btn-bonif-off{background:#f3f4f6;color:#64748b;border:1px solid #e2e8f0}.btn-bonif-off:hover{background:#ede9fe;color:#6d28d9}
    .btn-extend{background:#fef3c7;color:#92400e}.btn-extend:hover{background:#fde68a}
    .error{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:14px;margin-bottom:16px}
    .panel{display:none;min-height:100vh}
    nav{background:#1BA84C;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
    nav .logo{display:flex;align-items:center;gap:10px;color:#fff;font-size:18px;font-weight:800}
    nav .logout{color:#a8c5b5;font-size:13px;cursor:pointer;background:none;border:none;font-family:inherit}
    nav .logout:hover{color:#fff}
    .main{max-width:1300px;margin:0 auto;padding:32px 24px}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px}
    .stat{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #e2e8f0}
    .stat-num{font-size:26px;font-weight:800;color:#1BA84C}
    .stat-label{font-size:12px;color:#64748b;margin-top:4px}
    .card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
    .card-header{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .card-header h2{font-size:16px;font-weight:700}
    .search{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;font-family:inherit;width:240px}
    .search:focus{border-color:#1BA84C}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;background:#f8fafc;white-space:nowrap}
    td{padding:10px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
    tr:last-child td{border:none}
    tr:hover td{background:#f8fafc}
    .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
    .pill-green{background:#d1fae5;color:#065f46}
    .pill-amber{background:#fef3c7;color:#92400e}
    .pill-red{background:#fee2e2;color:#991b1b}
    .pill-blue{background:#dbeafe;color:#1e40af}
    .pill-purple{background:#ede9fe;color:#6d28d9}
    .pill-gray{background:#f1f5f9;color:#475569}
    .actions{display:flex;gap:5px;flex-wrap:wrap}
    .empty{text-align:center;padding:48px;color:#94a3b8;font-size:14px}
    .trial-bar{display:inline-block;width:60px;height:6px;background:#e2e8f0;border-radius:3px;vertical-align:middle;margin-left:6px;overflow:hidden}
    .trial-bar-fill{height:100%;border-radius:3px;transition:width .3s}
    @media(max-width:900px){
      .stats{grid-template-columns:repeat(3,1fr)}
      td:nth-child(4),th:nth-child(4),td:nth-child(5),th:nth-child(5){display:none}
    }
  </style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <svg width="32" height="32" viewBox="0 0 48 48"><rect width="48" height="48" rx="11" fill="#1BA84C"/><line x1="11" y1="14" x2="37" y2="14" stroke="white" stroke-width="5" stroke-linecap="round"/><line x1="37" y1="14" x2="11" y2="34" stroke="#E8674A" stroke-width="5" stroke-linecap="round"/><line x1="11" y1="34" x2="37" y2="34" stroke="white" stroke-width="5" stroke-linecap="round"/></svg>
      <span style="font-size:20px;font-weight:800"><span style="color:#1BA84C">z</span>entric</span>
    </div>
    <h1>Panel de administración</h1>
    <p>Ingresá con tu clave de administrador</p>
    <div id="loginError" class="error" style="display:none"></div>
    <div class="field">
      <label>Clave de administrador</label>
      <input type="password" id="adminSecret" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div class="panel" id="panel">
  <nav>
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 48 48"><rect width="48" height="48" rx="11" fill="rgba(255,255,255,0.2)"/><line x1="11" y1="14" x2="37" y2="14" stroke="white" stroke-width="5" stroke-linecap="round"/><line x1="37" y1="14" x2="11" y2="34" stroke="#E8674A" stroke-width="5" stroke-linecap="round"/><line x1="11" y1="34" x2="37" y2="34" stroke="white" stroke-width="5" stroke-linecap="round"/></svg>
      Gestumio Admin
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <span id="lastUpdated" style="color:#a8c5b5;font-size:12px"></span>
      <button class="logout" onclick="loadAccounts()">↺ Actualizar</button>
      <button class="logout" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </nav>
  <div class="main">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Cuentas totales</div></div>
      <div class="stat"><div class="stat-num" id="statActive">—</div><div class="stat-label">✅ Activas (pagas)</div></div>
      <div class="stat"><div class="stat-num" id="statTrial">—</div><div class="stat-label">🕐 En prueba</div></div>
      <div class="stat"><div class="stat-num" id="statExpired">—</div><div class="stat-label">❌ Vencidas</div></div>
      <div class="stat"><div class="stat-num" id="statBonif">—</div><div class="stat-label">🎁 Bonificadas</div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <h2>Cuentas registradas</h2>
        <input class="search" type="text" placeholder="Buscar negocio o email..." oninput="filterTable(this.value)"/>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Negocio</th>
              <th>Propietario</th>
              <th>Último acceso</th>
              <th>Usuarios</th>
              <th>Cuota/mes</th>
              <th>Registro</th>
              <th>Estado / Trial</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="accountsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api';
let secret = '';
let allAccounts = [];

function doLogin() {
  const val = document.getElementById('adminSecret').value.trim();
  if (!val) return;
  secret = val;
  document.getElementById('loginError').style.display = 'none';
  loadAccounts();
}

function doLogout() {
  secret = '';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('panel').style.display = 'none';
  document.getElementById('adminSecret').value = '';
}

async function loadAccounts() {
  try {
    const res = await fetch(API + '/admin/accounts', { headers: { 'X-Admin-Secret': secret } });
    if (res.status === 401) {
      document.getElementById('loginError').textContent = 'Clave incorrecta';
      document.getElementById('loginError').style.display = 'block';
      return;
    }
    const data = await res.json();
    if (!Array.isArray(data)) {
      document.getElementById('loginError').textContent = 'Error del servidor: ' + (data.error || 'desconocido');
      document.getElementById('loginError').style.display = 'block';
      return;
    }
    allAccounts = data;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    document.getElementById('lastUpdated').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-AR');
    renderStats();
    renderTable(allAccounts);
  } catch(e) {
    document.getElementById('loginError').textContent = 'Error de conexión: ' + e.message;
    document.getElementById('loginError').style.display = 'block';
  }
}

function renderStats() {
  document.getElementById('statTotal').textContent = allAccounts.length;
  document.getElementById('statActive').textContent = allAccounts.filter(a => a.subscriptionStatus === 'active' && !a.bonificado).length;
  document.getElementById('statTrial').textContent = allAccounts.filter(a => a.subscriptionStatus === 'trial').length;
  document.getElementById('statExpired').textContent = allAccounts.filter(a => a.subscriptionStatus === 'expired').length;
  document.getElementById('statBonif').textContent = allAccounts.filter(a => a.bonificado).length;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function fmtRelative(d) {
  if (!d) return '—';
  const diff = Date.now() - new Date(d).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'ahora';
  if (mins < 60) return `hace ${mins} min`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `hace ${hrs} h`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `hace ${days} d`;
  return fmtDate(d);
}

function statusPill(a) {
  if (a.bonificado) return '<span class="pill pill-purple">🎁 Bonificada</span>';
  const s = a.subscriptionStatus;
  if (s === 'active') return '<span class="pill pill-green">✅ Activa</span>';
  if (s === 'expired') return '<span class="pill pill-red">❌ Vencida</span>';
  if (s === 'pending') return '<span class="pill pill-blue">⏳ Pago pendiente</span>';
  // trial
  const days = a.trialDaysLeft || 0;
  const pct = Math.min(100, Math.round((days / 14) * 100));
  const color = days > 7 ? '#10b981' : days > 3 ? '#f59e0b' : '#ef4444';
  return `<span class="pill pill-amber">🕐 Trial</span>
    <div style="display:inline-flex;align-items:center;gap:4px;margin-left:4px">
      <span style="font-size:11px;color:#64748b">${days}d restantes</span>
      <span class="trial-bar"><span class="trial-bar-fill" style="width:${pct}%;background:${color}"></span></span>
    </div>`;
}

function renderTable(accounts) {
  const tbody = document.getElementById('accountsBody');
  if (!accounts.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">Sin cuentas registradas</td></tr>';
    return;
  }
  tbody.innerHTML = accounts.map(a => {
    const date = fmtDate(a.createdAt);
    const lastAccess = fmtRelative(a.owner?.lastAccessAt);
    const approvePill = a.approved
      ? '<span class="pill pill-green" style="margin-left:4px;font-size:10px">Aprobada</span>'
      : '<span class="pill pill-amber" style="margin-left:4px;font-size:10px">Pendiente</span>';

    const bonifBtn = a.bonificado
      ? `<button class="btn-sm btn-bonif-on" onclick="toggleBonif('${a.id}',false)" title="Quitar bonificación">🎁 Bonificada</button>`
      : `<button class="btn-sm btn-bonif-off" onclick="toggleBonif('${a.id}',true)" title="Marcar como bonificada">🎁 Bonificar</button>`;

    const approveBtn = a.approved
      ? `<button class="btn-sm btn-reject" onclick="reject('${a.id}')">Revocar</button>`
      : `<button class="btn-sm btn-approve" onclick="approve('${a.id}')">Aprobar</button>`;

    const extendBtn = (a.subscriptionStatus === 'trial' || a.subscriptionStatus === 'expired')
      ? `<button class="btn-sm btn-extend" onclick="extendTrial('${a.id}')" title="Resetear trial a 14 días">+14d</button>`
      : '';

    return `<tr>
      <td>
        <div style="font-weight:600">${a.name}</div>
        <div style="font-size:11px;color:#94a3b8">${a.category || ''}</div>

      </td>
      <td>
        <div style="font-weight:500">${a.owner?.name || '—'}</div>
        <div style="font-size:11px;color:#94a3b8">${a.owner?.email || '—'}</div>
        ${a.phone ? `<a href="https://wa.me/${a.phone.replace(/\D/g,'')}" target="_blank" style="font-size:11px;color:#25d366;text-decoration:none;display:inline-flex;align-items:center;gap:3px;margin-top:2px">📞 ${a.phone}</a>` : '<div style="font-size:11px;color:#cbd5e1;margin-top:2px">Sin teléfono</div>'}
      </td>
      <td style="color:#64748b;white-space:nowrap">${lastAccess}</td>
      <td style="text-align:center">
        <div><span style="font-weight:700;font-size:15px">${a.userCount}</span><span style="font-size:11px;color:#94a3b8">/${a.userLimit}</span></div>
        <div style="margin-top:5px;display:flex;align-items:center;justify-content:center;gap:5px">
          <button class="btn-sm" style="padding:1px 8px;background:#e2e8f0;color:#334155" onclick="setExtra('${a.id}',${a.extraUsers - 1})" ${a.extraUsers <= 0 ? 'disabled' : ''} title="Quitar usuario extra">−</button>
          <span style="font-size:11px;color:#64748b" title="Usuarios extra (+$20.000 c/u)">+${a.extraUsers} extra</span>
          <button class="btn-sm" style="padding:1px 8px;background:#dbeafe;color:#1e40af" onclick="setExtra('${a.id}',${a.extraUsers + 1})" title="Agregar usuario extra (+$20.000/mes)">+</button>
        </div>
      </td>
      <td style="text-align:center;white-space:nowrap">
        <span style="font-weight:700;font-size:14px">$${a.monthlyPrice.toLocaleString('es-AR')}</span>
        ${a.extraUsers > 0 ? `<div style="font-size:10px;color:#94a3b8">50.000 + ${a.extraUsers}×20.000</div>` : '<div style="font-size:10px;color:#cbd5e1">plan base</div>'}
      </td>
      <td style="color:#64748b;white-space:nowrap">${date}</td>
      <td>
        ${statusPill(a)}
        ${approvePill}
      </td>
      <td>
        <div class="actions">
          ${bonifBtn}
          ${approveBtn}
          ${extendBtn}
          <button class="btn-sm" style="background:#dcfce7;color:#166534" onclick="setWhatsApp('${a.id}','${(a.waPhoneId||'').replace(/'/g,"\\'")}','${(a.waPhoneNumber||'').replace(/'/g,"\\'")}')" title="Asignar numero de WhatsApp (Meta)">${a.waPhoneId ? '📱 WA ✓' : '📱 WA'}</button>
          <button class="btn-sm btn-delete" onclick="deleteAccount('${a.id}','${a.name.replace(/'/g,"\\'")}')">Eliminar</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterTable(q) {
  const lower = q.toLowerCase();
  renderTable(allAccounts.filter(a =>
    a.name?.toLowerCase().includes(lower) ||
    a.owner?.email?.toLowerCase().includes(lower) ||
    a.owner?.name?.toLowerCase().includes(lower) ||
    a.phone?.toLowerCase().includes(lower)
  ));
}

async function approve(id) {
  await fetch(API + `/admin/accounts/${id}/approve`, { method:'PUT', headers:{'X-Admin-Secret':secret} });
  loadAccounts();
}

async function reject(id) {
  if (!confirm('¿Revocar acceso a esta cuenta?')) return;
  await fetch(API + `/admin/accounts/${id}/reject`, { method:'PUT', headers:{'X-Admin-Secret':secret} });
  loadAccounts();
}

async function toggleBonif(id, val) {
  const msg = val ? '¿Marcar esta cuenta como bonificada (acceso gratuito)?' : '¿Quitar la bonificación?';
  if (!confirm(msg)) return;
  await fetch(API + `/admin/accounts/${id}/bonificado`, {
    method: 'PUT',
    headers: { 'X-Admin-Secret': secret, 'Content-Type': 'application/json' },
    body: JSON.stringify({ bonificado: val })
  });
  loadAccounts();
}

async function extendTrial(id) {
  if (!confirm('¿Resetear el trial a 14 días desde hoy?')) return;
  await fetch(API + `/admin/accounts/${id}/extend-trial`, { method:'PUT', headers:{'X-Admin-Secret':secret} });
  loadAccounts();
}

async function setWhatsApp(id, currentId, currentNum) {
  const phoneId = prompt('Phone Number ID de Meta para este negocio (dejá vacío para desvincular):', currentId || '');
  if (phoneId === null) return;
  let phoneNumber = '';
  if (phoneId.trim()) {
    phoneNumber = prompt('Número visible (ej: +54 9 11 1234-5678):', currentNum || '') || '';
  }
  const r = await fetch(API + `/admin/accounts/${id}/whatsapp`, {
    method: 'PUT',
    headers: { 'X-Admin-Secret': secret, 'Content-Type': 'application/json' },
    body: JSON.stringify({ phoneId: phoneId.trim(), phoneNumber: (phoneNumber||'').trim() })
  });
  if (r.ok) { loadAccounts(); }
  else { const e = await r.json().catch(()=>({})); alert('Error: ' + (e.error || 'no se pudo guardar')); }
}

async function setExtra(id, n) {
  if (n < 0) return;
  const r = await fetch(API + `/admin/accounts/${id}/extra-users`, {
    method: 'PUT',
    headers: { 'X-Admin-Secret': secret, 'Content-Type': 'application/json' },
    body: JSON.stringify({ extraUsers: n })
  });
  if (r.ok) { loadAccounts(); }
  else { const e = await r.json().catch(()=>({})); alert('Error: ' + (e.error || 'no se pudo actualizar')); }
}

async function deleteAccount(id, name) {
  if (!confirm(`¿Eliminar la cuenta "${name}" y todos sus datos? Esta acción no se puede deshacer.`)) return;
  const r = await fetch(API + `/admin/accounts/${id}`, { method:'DELETE', headers:{'X-Admin-Secret':secret} });
  if (r.ok) { loadAccounts(); }
  else { const e = await r.json(); alert('Error: ' + e.error); }
}
</script>
</body>
</html>
